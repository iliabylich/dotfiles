[config.wallpaper]
command = "systemctl --user restart swaybg"
set = true

[templates.dunst]
input_path = '~/.config/dunst/dunstrc.template'
output_path = '~/.config/dunst/dunstrc'
post_hook = 'systemctl --user restart dunst && notify-send "Theme has been changed"'

[templates.hyprland]
input_path = '~/.config/hypr/colors.conf.template'
output_path = '~/.config/hypr/colors.conf'

[templates.fuzzel]
input_path = '~/.config/fuzzel/fuzzel.ini.template'
output_path = '~/.config/fuzzel/fuzzel.ini'

[templates.ghostty]
input_path = '~/.config/ghostty/config.template'
output_path = '~/.config/ghostty/config'
# post_hook = 'hyprctl dispatch sendshortcut "CTRL SHIFT, comma, class:com.mitchellh.ghostty"'
